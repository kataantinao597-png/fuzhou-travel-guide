<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鏈夌涔嬪窞 路 涓ゅぉ涓€澶滄梾琛屾敾鐣?/title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
<style>
/* ===========================================
   绂忓窞鏃呰鏀荤暐 路 B 鍨嬪疄鐢ㄥ伐鍏疯瑙変綋绯?   Inspired by: 椹瀺澧?路 瀵垮北鐭?路 鑼夎帀鑺?   =========================================== */

:root {
  /* 瀵垮北鐭宠崝鏋濈櫧 鈥?娓╂殩搴曡壊 */
  --fz-stone: #faf8f2;
  --fz-stone-warm: #f5f0e7;
  /* 榛涚摝鐏?鈥?娣遍們鏂囧瓧 */
  --fz-dark: #242729;
  --fz-dark-80: #4a4d4f;
  --fz-dark-60: #727577;
  --fz-dark-40: #9b9d9f;
  --fz-dark-15: #d4d5d5;
  --fz-dark-08: #e8e8e8;
  /* 澶х孩琚嶇孩 鈥?楂樼骇鐐圭紑 */
  --fz-red: #8c2425;
  --fz-red-light: #b84041;
  /* 閲戠當閲?鈥?楂樹寒鏍囩 */
  --fz-gold: #c8a45c;
  --fz-gold-light: #e4d0a0;
  --fz-gold-pale: #f5ecd8;
  /* 婕嗗櫒缁?鈥?鑷劧灞辨按 */
  --fz-jade: #5b7a6a;
  --fz-jade-light: #8faa98;
  --fz-jade-pale: #dce8e0;
  /* 闂磋窛鏍呮牸 */
  --grid: 8px;
  /* 鍦嗚浣撶郴 鈥?妯℃嫙椹瀺澧欑嚂灏捐剨 */
  --r-sm: 8px;
  --r-md: 16px;
  --r-lg: 24px;
  --r-xl: 32px;
  --r-card: 24px 4px 24px 4px;
  --r-card-alt: 4px 24px 4px 24px;
  /* 闃村奖 */
  --shadow-sm: 0 2px 8px rgba(36,39,41,0.04);
  --shadow-md: 0 8px 32px rgba(36,39,41,0.07);
  --shadow-lg: 0 16px 48px rgba(140,36,37,0.06);
  /* 瀛椾綋 */
  --font-display: "Noto Serif SC", "SimSun", "STSong", serif;
  --font-body: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-accent: "KaiTi", "STKaiti", serif;
  /* 鍔ㄧ敾 */
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
}

/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; scroll-padding-top: 72px; }
body {
  font-family: var(--font-body);
  color: var(--fz-dark);
  background: var(--fz-stone);
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* 瀹ｇ焊绾圭悊 */
body::after {
  content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  opacity: 0.35;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(180,160,130,0.015) 2px, rgba(180,160,130,0.015) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(170,150,120,0.01) 3px, rgba(170,150,120,0.01) 6px);
}

::selection { background: rgba(140,36,37,0.12); color: var(--fz-dark); }

/* ===== Wrapper ===== */
.wrapper {
  max-width: 1100px;
  margin: 0 auto;
  padding: calc(var(--grid) * 3) calc(var(--grid) * 4);
}

/* ===========================================
   Navigation 鈥?姣涚幓鐠冮《鏍?   =========================================== */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 60px;
  background: rgba(250,248,242,0.78);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid transparent;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.nav.scrolled { border-bottom-color: var(--fz-dark-08); box-shadow: var(--shadow-sm); }
.nav-inner {
  max-width: 1100px; margin: 0 auto; height: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 calc(var(--grid) * 4);
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 1.1rem; font-weight: 700; letter-spacing: 0.1em;
  color: var(--fz-dark); text-decoration: none;
}
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  text-decoration: none; color: var(--fz-dark-60);
  font-size: 0.84rem; font-weight: 500;
  padding: 6px 16px; border-radius: 100px;
  transition: all 0.25s var(--ease-out); white-space: nowrap;
}
.nav-links a:hover { color: var(--fz-dark); background: var(--fz-dark-08); }
.nav-links a.active { color: var(--fz-red); background: rgba(140,36,37,0.06); font-weight: 600; }

/* ===========================================
   Hero 鈥?绠€娲佸疄鐢ㄥ瀷
   =========================================== */
.hero {
  min-height: 70vh; display: flex; align-items: center;
  padding: 120px 20px 60px;
  background: linear-gradient(170deg, #1E3028 0%, #2A3F33 25%, #3A5342 55%, #4D6455 85%, var(--fz-stone) 100%);
  position: relative; overflow: hidden;
}
.hero::before {
  content: ""; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 30% 20%, rgba(200,164,92,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 70% 60%, rgba(91,122,106,0.10) 0%, transparent 60%),
    radial-gradient(circle 3px at 20% 85%, rgba(228,208,160,0.12) 0%, transparent 100%),
    radial-gradient(circle 4px at 45% 90%, rgba(228,208,160,0.08) 0%, transparent 100%),
    radial-gradient(circle 2px at 65% 88%, rgba(228,208,160,0.10) 0%, transparent 100%);
}
.hero-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 2; }
.hero-label {
  display: inline-block; font-family: var(--font-accent);
  font-size: 1.2rem; color: var(--fz-gold-light);
  border: 1.5px solid rgba(228,208,160,0.4);
  padding: 6px 20px; border-radius: 4px;
  transform: rotate(-4deg); margin-bottom: 28px;
  opacity: 0;
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(2.8rem, 6vw, 4.8rem);
  font-weight: 900; color: #FFFEF8;
  line-height: 1.15; letter-spacing: 0.03em;
  margin-bottom: 16px; opacity: 0;
}
.hero h1 em {
  font-family: var(--font-accent); font-style: normal;
  color: var(--fz-gold-light); font-size: 0.75em;
}
.hero-desc {
  font-size: 1.05rem; color: rgba(255,255,248,0.55);
  max-width: 560px; line-height: 1.7; opacity: 0;
}
.hero-stats {
  display: flex; gap: 48px; margin-top: 40px; opacity: 0;
}
.hero-stat-num {
  font-family: var(--font-display);
  font-size: 2rem; font-weight: 800; color: rgba(255,255,248,0.9);
}
.hero-stat-label { font-size: 0.78rem; color: rgba(255,255,248,0.4); letter-spacing: 0.06em; }

/* 椹瀺澧欏簳寮?*/
.hero-arc {
  position: absolute; bottom: -2px; left: 0; right: 0; height: 64px;
  background: var(--fz-stone);
  clip-path: ellipse(80% 100% at 50% 100%);
  z-index: 3;
}

/* ===========================================
   Quick Info Bar
   =========================================== */
.quick-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: calc(var(--grid) * 2);
  margin-bottom: calc(var(--grid) * 10);
}
.quick-item {
  background: #fff; border-radius: var(--r-card);
  padding: calc(var(--grid) * 3);
  box-shadow: var(--shadow-sm);
  display: flex; align-items: flex-start; gap: 14px;
  transition: transform 0.4s var(--ease), box-shadow 0.4s var(--ease);
  opacity: 0;
}
.quick-item:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.quick-item-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; flex-shrink: 0;
}
.quick-item-icon.i-place { background: rgba(140,36,37,0.07); }
.quick-item-icon.i-time { background: rgba(91,122,106,0.07); }
.quick-item-icon.i-trans { background: rgba(200,164,92,0.10); }
.quick-item h4 { font-size: 0.9rem; font-weight: 700; color: var(--fz-dark); margin-bottom: 2px; }
.quick-item p  { font-size: 0.8rem; color: var(--fz-dark-60); line-height: 1.5; }

/* ===========================================
   Section Headers
   =========================================== */
.section-eyebrow {
  display: block; font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.15em; color: var(--fz-red);
  margin-bottom: calc(var(--grid) * 1); opacity: 0;
}
.section-title {
  font-family: var(--font-display);
  font-size: 1.8rem; font-weight: 700;
  color: var(--fz-dark); margin-bottom: 8px; opacity: 0;
}
.section-desc {
  font-size: 0.9rem; color: var(--fz-dark-60);
  margin-bottom: calc(var(--grid) * 5); opacity: 0;
}

/* ===========================================
   Day Card 鈥?鏍稿績琛岀▼鍗?   =========================================== */
.day-card {
  background: #fff;
  border-radius: var(--r-card);
  box-shadow: var(--shadow-md);
  margin-bottom: calc(var(--grid) * 5);
  overflow: hidden;
  opacity: 0;
  transition: box-shadow 0.4s var(--ease);
}
.day-card:hover { box-shadow: var(--shadow-lg); }
/* 椹瀺澧欏僵鏉￠《 */
.day-card::before {
  content: ""; display: block; height: 4px;
  background: linear-gradient(90deg,
    var(--fz-red) 0%, var(--fz-red) 28%, transparent 28%, transparent 32%,
    var(--fz-gold) 32%, var(--fz-gold) 62%, transparent 62%, transparent 66%,
    var(--fz-jade) 66%, var(--fz-jade) 100%);
  opacity: 0.45;
}

.day-card-header {
  padding: calc(var(--grid) * 4) calc(var(--grid) * 5);
  display: flex; align-items: flex-start; gap: 16px;
  border-bottom: 1px dashed var(--fz-dark-08);
  cursor: pointer; user-select: none;
  transition: background 0.2s;
}
.day-card-header:hover { background: rgba(250,248,242,0.5); }
.day-num {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-weight: 900; font-size: 1.3rem; color: #fff;
  flex-shrink: 0;
}
.day-num.d1 { background: linear-gradient(135deg, #8c2425, #b84041); }
.day-num.d2 { background: linear-gradient(135deg, #3a5a48, #5b7a6a); }
.day-header-info { flex: 1; }
.day-theme {
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
  color: var(--fz-dark-40); margin-bottom: 2px;
}
.day-name {
  font-family: var(--font-display);
  font-size: 1.4rem; font-weight: 700; color: var(--fz-dark);
}
.day-route {
  font-size: 0.85rem; color: var(--fz-dark-60);
  margin-top: 4px;
}
.day-toggle {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid var(--fz-dark-15);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; color: var(--fz-dark-40);
  flex-shrink: 0; transition: all 0.4s var(--ease);
}
.day-card.expanded .day-toggle { transform: rotate(45deg); border-color: var(--fz-red); color: var(--fz-red); }

.day-card-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.55s var(--ease);
}
.day-card.expanded .day-card-body { max-height: 4000px; }

/* Stop Item */
.stop-list { padding: 0; list-style: none; }
.stop-item {
  padding: calc(var(--grid) * 3) calc(var(--grid) * 5);
  display: flex; gap: 16px;
  border-bottom: 1px solid var(--fz-dark-08);
  transition: background 0.2s;
}
.stop-item:last-child { border-bottom: none; }
.stop-item:hover { background: rgba(250,248,242,0.3); }
.stop-marker {
  width: 32px; flex-shrink: 0; text-align: center;
  padding-top: 2px;
}
.stop-dot {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; background: var(--fz-red);
  box-shadow: 0 0 0 3px rgba(140,36,37,0.15);
}
.stop-dot.sd-jade { background: var(--fz-jade); box-shadow: 0 0 0 3px rgba(91,122,106,0.15); }
.stop-dot.sd-gold { background: var(--fz-gold); box-shadow: 0 0 0 3px rgba(200,164,92,0.18); }
.stop-body { flex: 1; min-width: 0; }
.stop-top {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 6px; flex-wrap: wrap;
}
.stop-num {
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em;
  color: var(--fz-dark-40); white-space: nowrap;
}
.stop-title {
  font-size: 1.1rem; font-weight: 700; color: var(--fz-dark); line-height: 1.3;
}
.stop-meta {
  display: flex; gap: 14px; flex-wrap: wrap;
  margin-bottom: 8px;
}
.stop-meta-item {
  font-size: 0.75rem; color: var(--fz-dark-40);
  display: flex; align-items: center; gap: 4px;
}
.stop-meta-item .hl { color: var(--fz-red); font-weight: 600; }
.stop-desc {
  font-size: 0.85rem; color: var(--fz-dark-60); line-height: 1.7;
  margin-bottom: 8px;
}
.stop-desc strong { color: var(--fz-dark); font-weight: 600; }
.stop-highlights {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
}
.stop-tag {
  font-size: 0.72rem; font-weight: 600; padding: 3px 10px;
  border-radius: 100px; white-space: nowrap;
}
.stop-tag.food { background: rgba(140,36,37,0.06); color: var(--fz-red); }
.stop-tag.spot { background: rgba(91,122,106,0.06); color: var(--fz-jade); }
.stop-tag.tip  { background: rgba(200,164,92,0.10); color: #8a6d2b; }
.stop-actions {
  display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;
}
.stop-btn {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.75rem; font-weight: 500;
  padding: 5px 14px; border-radius: 100px;
  text-decoration: none;
  transition: all 0.25s var(--ease-out);
}
.stop-btn.map {
  color: var(--fz-jade); background: rgba(91,122,106,0.06);
  border: 1px solid rgba(91,122,106,0.12);
}
.stop-btn.map:hover { background: rgba(91,122,106,0.12); }
.stop-btn.navi {
  color: #3B7DD8; background: rgba(59,125,216,0.06);
  border: 1px solid rgba(59,125,216,0.12);
}
.stop-btn.navi:hover { background: rgba(59,125,216,0.12); }
.stop-btn.didi {
  color: #E85D04; background: rgba(232,93,4,0.06);
  border: 1px solid rgba(232,93,4,0.15);
}
.stop-btn.didi:hover { background: rgba(232,93,4,0.14); }

/* Transit connector */
.stop-transit {
  padding: 10px calc(var(--grid) * 5) 10px calc(var(--grid) * 5 + 48px);
  font-size: 0.8rem; color: var(--fz-dark-40);
  background: rgba(250,248,242,0.6);
  border-bottom: 1px solid var(--fz-dark-08);
  position: relative;
}
.stop-transit::before {
  content: ""; position: absolute; left: calc(var(--grid) * 5 + 15px); top: 0; bottom: 0; width: 2px;
  background: repeating-linear-gradient(to bottom, var(--fz-dark-15) 0px, var(--fz-dark-15) 3px, transparent 3px, transparent 7px);
}

/* ===========================================
   More Cards 鈥?Bento Grid
   =========================================== */
.more-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: calc(var(--grid) * 3);
  margin-bottom: calc(var(--grid) * 10);
}
.more-card {
  background: #fff;
  border-radius: var(--r-card);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  opacity: 0;
  transition: transform 0.4s var(--ease), box-shadow 0.4s var(--ease);
  cursor: pointer;
}
.more-card:nth-child(3n+2) { border-radius: var(--r-card-alt); }
.more-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
.more-card-image {
  width: 100%; height: 180px; object-fit: cover;
  position: relative; display: block;
  transition: transform 0.6s var(--ease);
}
.more-card-image-wrapper {
  position: relative; overflow: hidden;
}
/* 缁㈡湰璐ㄦ劅鍙犲姞 */
.more-card-image-wrapper::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(200,164,92,0.04) 2px, rgba(200,164,92,0.04) 4px);
  mix-blend-mode: overlay;
}
.more-card:hover .more-card-image { transform: scale(1.06); }
.more-card-body { padding: calc(var(--grid) * 3); }
.more-card-tag {
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em;
  color: var(--fz-red); margin-bottom: 4px; display: block;
}
.more-card h4 {
  font-family: var(--font-display);
  font-size: 1.05rem; font-weight: 700; color: var(--fz-dark);
  margin-bottom: 4px; line-height: 1.3;
}
.more-card p {
  font-size: 0.8rem; color: var(--fz-dark-60); line-height: 1.55;
}
.more-card-meta {
  display: flex; gap: 12px; margin-top: 10px;
  font-size: 0.72rem; color: var(--fz-dark-40);
}

/* ===========================================
   Tips Section
   =========================================== */
.tips-wrapper {
  background: #fff;
  border-radius: var(--r-card);
  box-shadow: var(--shadow-md);
  padding: calc(var(--grid) * 4);
  opacity: 0;
}
.tips-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: calc(var(--grid) * 3);
}
.tip-item {
  display: flex; gap: 12px;
  padding: calc(var(--grid) * 1.5);
  border-radius: var(--r-sm);
  transition: background 0.2s;
}
.tip-item:hover { background: rgba(250,248,242,0.5); }
.tip-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0;
  background: var(--fz-stone-warm); border: 1px solid var(--fz-dark-08);
}
.tip-text h5 { font-size: 0.88rem; font-weight: 700; color: var(--fz-dark); margin-bottom: 2px; }
.tip-text p  { font-size: 0.78rem; color: var(--fz-dark-60); line-height: 1.5; }

/* ===========================================
   Footer
   =========================================== */
.footer {
  text-align: center; padding: 48px 20px 32px;
  margin-top: calc(var(--grid) * 8);
  border-top: 1px solid var(--fz-dark-08);
  color: var(--fz-dark-40); font-size: 0.82rem;
  opacity: 0;
}
.footer strong {
  font-family: var(--font-accent);
  font-size: 1.1rem; color: var(--fz-dark-60); font-weight: 400;
  display: block; margin-bottom: 6px;
}

/* ===========================================
   Animations 鈥?Intersection Observer driven
   =========================================== */
.fade-up {
  opacity: 0; transform: translateY(30px);
  transition: opacity 0.7s var(--ease), transform 0.7s var(--ease);
}
.fade-up.visible { opacity: 1; transform: translateY(0); }

/* ===========================================
   Back to top
   =========================================== */
.back-top {
  position: fixed; bottom: 28px; right: 28px; z-index: 999;
  width: 44px; height: 44px; border-radius: 50%;
  background: #fff; border: 1px solid var(--fz-dark-15);
  box-shadow: var(--shadow-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; color: var(--fz-dark-60);
  cursor: pointer; opacity: 0; pointer-events: none;
  transition: all 0.3s var(--ease-out);
}
.back-top.visible { opacity: 1; pointer-events: auto; }
.back-top:hover { border-color: var(--fz-red); color: var(--fz-red); box-shadow: var(--shadow-md); }

/* ===========================================
   Responsive
   =========================================== */
@media (max-width: 768px) {
  .wrapper { padding: calc(var(--grid) * 2) calc(var(--grid) * 2); }
  .hero { min-height: 55vh; padding: 100px 20px 80px; }
  .hero h1 { font-size: 2.2rem; }
  .hero-stats { gap: 16px; }
  .hero-stat-num { font-size: 1.2rem; }
  .hero-stat-label { font-size: 0.68rem; }
  .hero-arc { height: 40px; }
  .hero-desc { font-size: 0.88rem; }
  .quick-bar { grid-template-columns: 1fr; }
  .day-card-header { padding: calc(var(--grid) * 3) calc(var(--grid) * 3); }

<script>
/* ===== Nav scroll effect ===== */
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 20));

/* ===== Nav active state ===== */
const sections = document.querySelectorAll('h2[id]');
const navLinks = document.querySelectorAll('.nav-links a');
window.addEventListener('scroll', () => {
  let current = '';
  sections.forEach(s => { if (window.scrollY >= s.offsetTop - 150) current = s.id; });
  navLinks.forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === '#' + current);
  });
});

/* ===== Back to top ===== */
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => backTop.classList.toggle('visible', window.scrollY > 600));

/* ===== Card expand/collapse ===== */
function toggleCard(id) {
  document.getElementById(id).classList.toggle('expanded');
}

/* ===== Intersection Observer for fade-up animations ===== */
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

/* ===== Auto-expand Day 1 on load ===== */
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => document.getElementById('day1-card').classList.add('expanded'), 600);
